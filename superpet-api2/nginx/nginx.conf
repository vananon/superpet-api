server {
    listen 80;
    
    # En un entorno real aqui pondrias tu server_name (ej: tu-dominio.com o IP publica)
    # server_name localhost;

    location / {
        # 'api' es el nombre del servicio en docker-compose.yml
        # '3000' es el puerto interno donde escucha Node.js
        proxy_pass http://api:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Para que tu API sepa la IP real del cliente que se conecta
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
